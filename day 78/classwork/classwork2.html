<!-- 3) შექმენი რიცხვების მასივი 1, 2, 3, 4, 5, 6.
map მეთოდით თითოეულ რიცხვს დაუმატე მისი ინდექსი,
filter მეთოდით დატოვე მხოლოდ ლუწი შედეგები,
reduce მეთოდით იპოვე მათი ნამრავლი. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
    const numbers = [1, 2, 3, 4, 5, 6]
    const mapped = numbers.map((num, index) => num + index)
    const filtered = mapped.filter(num => num % 2 === 0)
    const product = filtered.reduce((acc, curr) => acc * curr, 1)

    console.log("map შედეგი:", mapped)
    console.log("ლუწი რიცხვები:", filtered)
    console.log("ნამრავლი:", product)
    </script>
</body>
</html>
