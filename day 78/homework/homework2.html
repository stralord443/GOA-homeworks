<body>
    <!-- 3) შექმენი რიცხვების მასივი 1, 3, 5, 7, 9.
    თითოეულ რიცხვს დაუმატე მისი პოზიციის ნომერი მასივში,
    დატოვე მხოლოდ ის შედეგები, რომლებიც კენტია,
    და გამოთვალე მათი ნამრავლი. -->

    <script>
        let number = [1,3,5,7,9]
        let addition = number.map((num, index) => num + index + 1)
        let oddNumbers = addition.filter(num => num % 2 !== 0)
        let multiply = oddNumbers.reduce((acc, curr) => acc * curr, 1)
        console.log(multiply)
    </script>
</body>
