<body>
    <!-- 4) შექმენი რიცხვების მასივი -8, -2, 0, 3, 6, 9, 11.
    ამოიღე ყველა უარყოფითი რიცხვი,
    დარჩენილი რიცხვებიდან თითოეულს დაუმატე 5,
    დატოვე მხოლოდ 10-ზე ნაკლები შედეგები
    და დაბეჭდე ისინი. -->

    <script>
        let num = [-8,-2,0,3,6,9,11]
        let filtered = num.filter(num => num >= 0)
        let added = filtered.map(num=> num + 5)
        let secondFiltered = added.filter(num => num < 10)
        console.log(secondFiltered)
    </script>
</body>
