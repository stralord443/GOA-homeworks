<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
// 2) შექმენი Car კლასი.
// ქონდეს:
// - brand

// getter აბრუნებდეს ბრენდს.
// setter ცვლიდეს ბრენდს მხოლოდ მაშინ, თუ ცარიელი ტექსტი არ არის.

        class Car {
            constructor(brand) {
                this.brand = brand
        }

    get brand() {
        return this._brand
    }

    set brand(value) {
        if (value !== "") {
            this._brand = value
        } else {
            console.log("ბრენდი არ შეიძლება იყოს ცარიელი")
        }
    }
}

    const car1 = new Car("BMW")

    console.log(car1.brand)

    car1.brand = ""
    car1.brand = "Mercedes"

    console.log(car1.brand)
    </script>
</body>
</html>
