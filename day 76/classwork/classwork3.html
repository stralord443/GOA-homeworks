<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .triangle{
            height: 100px;
            width: 100px;
            background-color: red;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
    </style>
</head>
<body>
    <!-- 6) შექმენი div და გამოიყენე clip-path: polygon() რომ სამკუთხედი გახდეს. -->

    <div class="triangle"></div>
</body>
</html>
