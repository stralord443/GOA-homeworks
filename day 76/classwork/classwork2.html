<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle{
            height: 100px;
            width: 100px;
            background-color: red;
            clip-path: circle(50%);
        }
    </style>
</head>
<body>
    <!-- 5) შექმენი სურათი და გამოიყენე clip-path: circle() რომ მრგვალი ჩარჩოში ჩასვა. -->

    <div class="circle">1</div>
</body>
</html>
