<!-- 2)CSS ცვლადები – ფერი და კიდეები
პირობა:
შექმენით ორი ყუთი (div) ზომით 150px x 150px.
შექმენით ცვლადები:
--main-color – ყუთის ფონისთვის
--border-radius – ყუთის კიდეებისთვის
გამოიყენეთ ცვლადები ორივე ყუთზე, ისე რომ მათი ფერი ან კიდეები მარტივად შეიცვალოს ცვლადის შეცვლით. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --main-color:aqua;
            --border-radius:20px;
        }
        .div1{
            height: 150px;
            width: 150px;
            background-color: var(--main-color);
            border-radius: 10px;
            border-color:blue;
        }
        .div2{
            height: 150px;
            width: 150px;
            background-color:red;
            border-radius:var(--border-radius);
            border-color:blue; 
        }
    </style>
</head>
<body>
    <div class="div1">1</div>
    <div class="div2">2</div>
</body>
</html>
