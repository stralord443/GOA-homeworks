<!-- 3)შერეული – სამკუთხედი + ცვლადი
პირობა:
შექმენით ყუთი (div) ზომით 200px x 200px.
შექმენით ცვლადი --shape-color ფონისთვის
გამოიყენეთ clip-path, რომ ყუთი იყოს სამკუთხედი -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --main-color:aqua;
        }
        .div1{
            height: 200px;
            width: 200px;
            background-color: var(--main-color);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
    </style>
</head>
<body>
    <div class="div1">1</div>
</body>
</html>
