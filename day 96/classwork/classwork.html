<!-- 1) შექმენი form TailwindCSS-ის გამოყენებით, სადაც გამოიყენებ Floating Label Input-ს (peer magic).
ფორმა უნდა შეიცავდეს მინიმუმ 2-3 input-ს (მაგ: name, email, password). გამოიყენე peer კლასი, რომ label
რეაგირებდეს input-ის მდგომარეობაზე და გააკეთე ლამაზი UI.
2) label თავდაპირველად იყოს input-ის შიგნით (placeholder-ის მსგავსად)
3) focus-ის ან ტექსტის ჩაწერისას label გადავიდეს ზემოთ და შემცირდეს ზომაში
4) tailwind.config.js-ში დაამატე custom ფერები  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: "#4F46E5",
                    secondary: "#06B6D4",
                    accent: "#F59E0B",
                }
            }
        }
    }
  </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <form class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md space-y-6">
        <h2 class="text-2xl font-bold text-center text-primary">Sign Up</h2>

        <div class="relative">
            <input type="text" id="name" class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2 text-gray-900
                placeholder-transparent focus:outline-none focus:border-primary"placeholder="Name"/>
            <label for="name" class="absolute left-4 top-2 text-gray-500 text-sm transition-all peer-placeholder-shown:top-3.5 
                peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-0.5 
                peer-focus:text-sm peer-focus:text-primary">Name</label>
        </div>
        <div class="relative">
            <input type="email" id="email"class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2 
                text-gray-900 placeholder-transparent focus:outline-none focus:border-secondary" placeholder="Email"/>
            <label for="email" class="absolute left-4 top-2 text-gray-500 text-sm transition-all peer-placeholder-shown:top-3.5 
                peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-0.5 
                peer-focus:text-sm peer-focus:text-secondary">Email</label>
        </div>
        <div class="relative">
            <input type="password" id="password" class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 
                pb-2 text-gray-900 placeholder-transparent focus:outline-none focus:border-accent" placeholder="Password"/>
            <label for="password" class="absolute left-4 top-2 text-gray-500 text-sm transition-all peer-placeholder-shown:top-3.5 
                peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-0.5  peer-focus:text-sm 
                peer-focus:text-accent">Password</label>
        </div>
        <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-indigo-600 transition">
            Create Account</button>
    </form>

</body>
</html>
