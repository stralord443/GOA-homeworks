<body>
    <script>
// 4) შექმენი კლასი InstagramAccount, რომელსაც ექნება public მეთოდი createPost().
// ამ მეთოდის გამოძახებისას უნდა გაეშვას private მეთოდები:
// #checkInternet()
// #uploadPhoto()
// #writeCaption()

// საბოლოოდ კონსოლში უნდა გამოიტანოს:
// "Post uploaded successfully"

    class InstagramAccount {
        createPost() {
            this.#checkInternet()
            this.#uploadPhoto()
            this.#writeCaption()

        console.log("Post uploaded successfully")
    }

    #checkInternet() {
        console.log("Internet connection checked")
    }

    #uploadPhoto() {
        console.log("Photo uploaded")
    }

    #writeCaption() {
        console.log("Caption written")
    }
}

    const account = new InstagramAccount()

    account.createPost()
    </script>
