<!-- 2) შექმენით თამაში სადაც ისევ დაჭერის შემდეგ უნდა გამოვიდეს დრო, მაგრამ დაამატეთ ეს ფუნქციონალი:
ქონდეს start ღილაკი, ამის დაჭერის შემდეგ უნდა აინთოს წითლად 3 div რიგრიგობით, ამ სამის სემდეგ კი
აინთოს მწვანე div, ამ მწვანე დივის ანთების შემდეგ იწყებოდეს დროის ათვლაც და ბოლოს გამოიტანეთ დრო
მილიწამებში თუ რა დროში დააჭირა მომხმარებელმა ბურთს ან რაიმეს, მწვანე დივის ანთების შემდეგ -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex flex-col items-center justify-center bg-gray-100">

    <button id="startBtn"
        class="px-6 py-3 bg-blue-500 text-white rounded-xl shadow-lg hover:bg-blue-600 transition mb-6">Start
    </button>

    <div class="flex gap-4 mb-6">
        <div class="w-16 h-16 bg-gray-300 rounded" id="light1"></div>
        <div class="w-16 h-16 bg-gray-300 rounded" id="light2"></div>
        <div class="w-16 h-16 bg-gray-300 rounded" id="light3"></div>
        <div class="w-16 h-16 bg-gray-300 rounded" id="greenLight"></div>
    </div>

    <p id="result" class="text-xl font-semibold text-gray-700"></p>

    <script>
        const startBtn = document.getElementById("startBtn");
        const lights = [
            document.getElementById("light1"),
            document.getElementById("light2"),
            document.getElementById("light3")
        ]
        const greenLight = document.getElementById("greenLight")
        const result = document.getElementById("result")

        let startTime
        let gameActive = false

        function resetLights() {
            [...lights, greenLight].forEach(light => {
                light.classList.remove("bg-red-500", "bg-green-500")
                light.classList.add("bg-gray-300")
            })
        }

        startBtn.addEventListener("click", () => {
            resetLights()
            result.textContent = ""
            startBtn.disabled = true

      // წითელი ლაითები რიგრიგობით
        lights.forEach((light, index) => {
            setTimeout(() => {
                light.classList.remove("bg-gray-300")
                light.classList.add("bg-red-500")
            }, (index + 1) * 700)
        })

      // მწვანე ლაითი
        setTimeout(() => {
            greenLight.classList.remove("bg-gray-300")
            greenLight.classList.add("bg-green-500")

            startTime = new Date(); // ტაიმერის დაწყება
            gameActive = true

        }, 3000);
        });

    // დაჭერა (reaction)
        greenLight.addEventListener("click", () => {
            if (!gameActive) return;

            const endTime = new Date();
            const reactionTime = endTime - startTime; // მილიწამებში

            result.textContent = `შენი რეაქცია: ${reactionTime} ms`;

            gameActive = false;
            startBtn.disabled = false;
        });
    </script>
</body>
</html>
