<!-- 1.შექმენი თამაში სადაც მომხმარებელი აჭერს start ღილაკს და ეკრანზე ჩნდება ტექსტი "Get Ready...",
გარკვეული დროის შემდეგ ჩნდება "GO!" და მომხმარებელმა უნდა დააჭიროს ღილაკს რაც შეიძლება სწრაფად
, ბოლოს გამოიტანე რეაქციის დრო -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="text-center">
    <h1 class="text-3xl font-bold mb-6">Reaction Time Game</h1>

    <div id="gameBox" class="w-80 h-40 flex items-center justify-center rounded-2xl bg-blue-500 text-white text-xl mb-6">
        დააჭირე Start</div>

    <button id="startBtn" class="px-6 py-3 bg-green-500 text-white rounded-xl hover:bg-green-600">Start</button>

    <p id="result" class="mt-4 text-lg font-semibold"></p>
</div>

<script>
    const startBtn = document.getElementById("startBtn")
    const gameBox = document.getElementById("gameBox")
    const result = document.getElementById("result")

    let startTime
    let waiting = false
    let ready = false

    startBtn.addEventListener("click", () => {
        result.textContent = ""
        gameBox.textContent = "Get Ready..."
        gameBox.classList.remove("bg-green-500")
        gameBox.classList.add("bg-red-500")

        waiting = true;
        ready = false;

        let randomDelay = Math.random() * 3000 + 2000 // 2-5 წამი

        setTimeout(() => {
            gameBox.textContent = "GO!"
            gameBox.classList.remove("bg-red-500")
            gameBox.classList.add("bg-green-500")

            startTime = new Date()
            ready = true
            waiting = false
        }, randomDelay)
    })

    gameBox.addEventListener("click", () => {
        if (waiting) {
            result.textContent = "ძალიან ადრე დააჭირე"
            gameBox.textContent = "დააჭირე Start თავიდან"
            gameBox.classList.remove("bg-red-500")
            gameBox.classList.add("bg-blue-500")
        } else if (ready) {
            let reactionTime = (new Date() - startTime) / 1000
            result.textContent = "შენი დრო: " + reactionTime.toFixed(3) + " წამი"

            gameBox.textContent = "დასრულდა!"
            ready = false
        }
    })
</script>
</html>
