<!-- 3) შექმენი Spin — „ტრიალი“ ანიმაცია -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin Animation</title>
<style>
    .spin {
        width: 100px;
        height: 100px;
        background-color: #4CAF50;
        margin: 50px auto;
        animation: spin 2s linear infinite;
    }

    @keyframes spin {
        from {
        transform: rotate(0deg);
        }
        to {
        transform: rotate(360deg);
        }
    }
</style>
</head>
<body>

    <div class="spin"></div>

</body>
</html>
