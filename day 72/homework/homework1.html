<!-- 2) შექმენით Bounce Loader ანიმაცია. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

    .bounce-loader {
        display: flex;
        gap: 10px;
    }

    .bounce-loader div {
        width: 14px;
        height: 14px;
        background-color: #3498db;
        border-radius: 50%;
        animation: bounce 0.6s infinite alternate;
    }

    .bounce-loader div:nth-child(2) {
        animation-delay: 0.2s;
    }

    .bounce-loader div:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes bounce {
        from {
            transform: translateY(0);
            opacity: 0.5;
        }
        to {
            transform: translateY(-20px);
            opacity: 1;
        }
    }
  </style>
</head>
<body>

  <div class="bounce-loader">
        <div></div>
        <div></div>
        <div></div>
  </div>

</body>
</html>
