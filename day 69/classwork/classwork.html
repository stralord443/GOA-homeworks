<!-- 1)კომენტარების სახით ახსენი რა არის DOM და რა როლს ასრულებს ვებგვერდზე (ისე ახსენით როგორც გაკვეთილის დასაწყისში განვიხილეთ). -->

<!-- dom: Document Object Model, used to give access to js for our document -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 2) შექმენი ერთი ელემენტი id="container"-ით. JavaScript-ში getElementById-ის
 გამოყენებით შეცვალე მისი ზომები, ფონის ფერი და დაამრგვალე კუთხეები. -->
    <div id="container"></div>

    <script>
        document.getElementById("container").style.width="100px"
        document.getElementById("container").style.height="100px"
        document.getElementById("container").style.backgroundColor="blue"
        document.getElementById("container").style.borderRadius="5px"
    </script>
</body>
</html>
