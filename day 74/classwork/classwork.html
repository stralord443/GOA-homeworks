<!-- 1) ახსენით რა არის opacity -->

<!-- opacity allows us to control tags transparancy from 1 to 0 -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1{
            height: 60px;
            width: 60px;
            border-radius: 50%;
            background-color: aquamarine;
            animation: bounce 2s ease-in-out infinite;
            
        }
        @keyframes bounce{
            0%{
                transform: translateY(150px)
            }
            50%{
                transform:translateY(50px)
            }
            100%{
                transform: translateY(150px);
            }
        }

    </style>
</head>
<body>
    <!-- 2) შექმენი div ბურთის ფორმით და გააკეთე bounce ანიმაცია, სადაც ბურთი ზემოთ-ქვემოთ მოძრაობს უსასრულოდ. -->

    <div class="div1"></div>
</body>
</html>
