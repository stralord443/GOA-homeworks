<!-- 2)მოძებნე ელემენტი CSS სელექტორით (id, class ან tag) და შეცვალე მისი შიგთავსი. (გამოიყენე querySelector()) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="div1">hello</div>
    <div id="div1">hello</div>

    <button onclick="textChange()">click me</button>

    <script>
        function textChange(){
            document.querySelector("#div1").innerHTML="bye"
        }
    </script>
</body>
</html>
