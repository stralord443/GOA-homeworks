<!-- 5)დაამატე და წაშალე CSS კლასები ელემენტიდან (მაგალითად ფერის შეცვლა ან ტექსტის გამოჩენა/დამალვა). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .highlight {
        color: white;
        background-color: green;
        padding: 10px;
    }

    .hidden {
        display: none;
    }
  </style>
</head>
<body>

    <p id="myText">ეს არის ტექსტი</p>
    <button id="toggleColorBtn">ფერის შეცვლა</button>
    <button id="toggleVisibilityBtn">ტექსტის დამალვა/გამოჩენა</button>

    <script>
        const text = document.getElementById("myText")
        const colorBtn = document.getElementById("toggleColorBtn")
        const visibilityBtn = document.getElementById("toggleVisibilityBtn")

    colorBtn.addEventListener("click", function () {
        text.classList.toggle("highlight")
    })

    visibilityBtn.addEventListener("click", function () {
            text.classList.toggle("hidden")
    })
    </script>
</body>
</html>
