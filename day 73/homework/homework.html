მეორედ დაჭერაზე ყველაფერი უნდა დაბრუნდეს საწყის მდგომარეობაში
გამოიყენე getElementById click innerHTML classList.toggle. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red{
            color: red;
        }
    </style>
</head>
<body>
    <div id="messageBox">hello</div>
    <br>
    <button onclick="textChange()">on/off</button>
    <button onclick="textChange2()">text change</button>
    <button onclick="textChange1()">text revert</button>

    <script>
        function textChange() {
            document.getElementById("messageBox").classList.toggle("red")
            document.getElementById("messageBox").innerHTML="bye"
        }
        function textChange1() {
            document.getElementById("messageBox").innerHTML="hello"
        }
        function textChange2() {
            document.getElementById("messageBox").innerHTML="bye"
        }
    </script>
</body>
</html>
