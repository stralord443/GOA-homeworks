<!-- 5) შექმენი ელემენტი, რომელიც hover-ზე ოდნავ შემცირდება და შემდეგ ნელა დაბრუნდება საწყის ზომაზე. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f6f9;
        font-family: sans-serif;
    }

    .box {
        width: 200px;
        height: 120px;
        background: #6c5ce7;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: transform 0.6s ease;
    }

    .box:hover {
        transform: scale(0.9);
        transition: transform 0.2s ease;
    }
</style>
</head>
<body>
    <div class="box">
        <p>Hover me</p>
    </div>
</body>
</html>
