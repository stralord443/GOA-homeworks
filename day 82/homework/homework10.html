<!-- 11) შექმენი სურათი, რომელსაც hover-ზე ექნება zoom + მცირე rotate ეფექტი ერთდროულად. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f6f9;
        font-family: sans-serif;
    }

    .image-container {
        width: 300px;
        height: 200px;
        overflow: hidden;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        cursor: pointer;
    }

    .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .image-container:hover img {
        transform: scale(1.2) rotate(5deg);
    }
</style>
</head>
<body>
    
    <div class="image-container">
        <img src="https://picsum.photos/600/400" alt="Example Image">
    </div>
</body>
</html>
