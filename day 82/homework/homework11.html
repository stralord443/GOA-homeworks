<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f6f9;
        font-family: sans-serif;
    }
    .btn {
        position: relative;
        overflow: hidden;
        padding: 12px 30px;
        font-size: 18px;
        color: #fff;
        background: #6c5ce7;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        z-index: 1;
    }
    .btn::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: rgba(255, 255, 255, 0.2);
        transform: translateX(-100%) translateY(-100%) rotate(45deg);
        transition: transform 0.6s ease;
        z-index: 0;
    }
    .btn:hover::before {
        transform: translateX(0) translateY(0) rotate(45deg);
    }
    .btn span {
        position: relative;
        z-index: 1;
    }
</style>
</head>
<body>
    <button class="btn"><span>Hover მე</span></button>
</body>
</html>
