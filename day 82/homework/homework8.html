<!-- 9) შექმენი ელემენტი, რომელიც hover-ზე დიაგონალურად გადაიწევს (translateX და translateY ერთად გამოიყენე). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f6f9;
        font-family: sans-serif;
    }

    .box {
        width: 180px;
        height: 120px;
        background: #ff7675;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .box:hover {
        transform: translateX(20px) translateY(-20px);
        box-shadow: -10px 15px 25px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>
    <div class="box">
        <p>hover me</p>
    </div>
</body>
</html>
