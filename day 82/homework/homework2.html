<!-- 3) შექმენი ღილაკი, რომლის შიგნით არსებული ტექსტი hover-ზე მარჯვნივ გადაიწევს, ხოლო ღილაკის ფონიც შეიცვლება. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f6f9;
        font-family: sans-serif;
    }

    .btn {
        background: #4a90e2;
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        overflow: hidden;
        transition: background 0.3s ease;
    }

    .btn p {
        display: inline-block;
        transition: transform 0.3s ease;
    }

    .btn:hover {
        background: #2c6fc1;
    }

    .btn:hover p {
        transform: translateX(8px);
    }
</style>
</head>
<body>
    <button class="btn">
        <p>დააჭირე აქ</p>
    </button>
</body>
</html>
