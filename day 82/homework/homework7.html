<!-- 8) გააკეთე ბარათი, რომელიც hover-ზე გადაბრუნდება და უკანა მხარეს სხვა ინფორმაცია გამოჩნდება (flip card ეფექტი). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f6f9;
        font-family: sans-serif;
    }

    .card-wrapper {
        perspective: 1000px;
    }

    .card {
        width: 260px;
        height: 180px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.6s ease;
    }

    .card-wrapper:hover .card {
        transform: rotateY(180deg);
    }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 18px;
        color: white;
        backface-visibility: hidden;
    }

    .card-front {
        background: #6c5ce7;
    }

    .card-back {
        background: #00b894;
        transform: rotateY(180deg);
    }
</style>
</head>
<body>
    
    <div class="card-wrapper">
        <div class="card">
            <div class="card-face card-front">
            <p>წინა მხარე</p>
            </div>
        <div class="card-face card-back">
        <p>უკანა ინფორმაცია</p>
    </div>
  </div>
</div>
</body>
</html>
