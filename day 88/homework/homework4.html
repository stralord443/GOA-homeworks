<!-- 5) შექმენი advanced card hover ეფექტით:

transform
rotate-2
scale-105
hover:-translate-y-3

transition duration-500 ease-in-out
Hover-ზე card-ის შიგნით არსებული ღილაკი გამოჩნდეს (opacity-0 → opacity-100).
დამატებითი პირობა: გამოიყენე group და group-hover. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <div class="flex items-center justify-center min-h-screen bg-gray-100 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6"> 

        <div class="group bg-white p-6 rounded-2xl shadow-lg transform hover:rotate-2 hover:scale-105 hover:-translate-y-3
        transition duration-500 ease-in-out w-72 text-center">

            <h3 class="text-xl font-bold mb-3">Advanced Card</h3>
            <p class="text-gray-600 mb-4">Hover the card to reveal the button.</p>

            <button class="opacity-0 group-hover:opacity-100 transition duration-500 bg-blue-500
            text-white px-4 py-2 rounded-lg">Learn More</button>

        </div>
    </div>
</body>
</html>
