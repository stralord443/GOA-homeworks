<!-- 3) შექმენი loader სამი პატარა წრით ერთმანეთის გვერდით (flex gap-2). 
თითოეულს ჰქონდეს animate-pulse და rounded-full. დაუმატე სხვადასხვა ზომა 
(w-3 h-3, w-4 h-4, w-5 h-5) და გააკეთე რომ ცენტრში იყოს განლაგებული (flex justify-center items-center h-screen). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <div class="flex justify-center items-center h-screen">
        <div class="flex gap-2">
            <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
            <div class="w-4 h-4 bg-blue-500 rounded-full animate-pulse"></div>
            <div class="w-5 h-5 bg-blue-500 rounded-full animate-pulse"></div>
        </div>
    </div>
</body>
</html>
