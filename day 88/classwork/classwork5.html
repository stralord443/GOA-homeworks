<!-- 6) შექმენი ღილაკი icon-ით. hover-ზე icon დატრიალდეს 180 გრადუსით (hover:rotate-180).
გამოიყენე transition-transform duration-500. დამატებით active-ზე დაამატე scale-90, ხოლო
hover-ზე ღილაკის ფერი შეიცვალოს. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="flex items-center justify-center h-screen">
    <button class="flex items-center gap-2 bg-blue-500 text-white px-4 py-2 rounded hover:rotate-180  transition-transform
                    duration-500 transition-colors duration-300 hover:bg-blue-600 active:scale-90">
  ღილაკი</button>
</body>
</html>
