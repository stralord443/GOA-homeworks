<!-- 3) გააკეთე input ველი.
თუ input ცარიელია:
ქვემოთ გამოჩნდეს წითელი ტექსტი ("Field is required")
თუ მომხმარებელი რაღაცას დაწერს:
ეს ტექსტი გაქრეს

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">
    <div class="w-72">
        <input type="text" placeholder="Enter something..." class="peer w-full p-3 border rounded-lg outline-none
            focus:border-blue-500" required/>
        <p class="text-red-500 text-sm mt-2 invisible peer-invalid:visible">Field is required</p>
    </div>
</body>
</html>
