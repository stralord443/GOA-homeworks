<!-- 5) შექმენი BankAccount კლასი.
მონაცემები: balance
ლოგიკა:
შექმენი შიდა მეთოდი _getFee(amount) →
თუ amount > 500 → 2%
სხვა შემთხვევაში → 1%
withdraw(amount):
დაითვალოს საკომისიო _getFee-ით
განახლდეს ბალანსი
დააბრუნოს ახალი ბალანსი toFixed(2)
დაბეჭდე console.log -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class BankAccount{
            constructor(balance){
                this.balance = balance
            }
            _getFee(amount){
                if(amount>=500){
                    return amount *= 0.02
                }else{
                    return amount *= 0.01
                }
            }
            withdraw(amount) {
                const fee = this._getFee(amount) // ვითვლით საკომისიოს
                const total = amount + fee // მთლიანად დასაკლები თანხა

                this.balance -= total // ვაახლებთ ბალანსს

                return this.balance.toFixed(2) // ვაბრუნებთ ფორმატირებულ მნიშვნელობას
            }
        }
        const account = new BankAccount(1000)
        console.log(account.withdraw(600))
    </script>
</body>
</html>
