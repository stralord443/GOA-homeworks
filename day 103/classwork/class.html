    <script>
        function shuffleArray(arr) {
  let copy = [...arr];
  
  for (let i = copy.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  
  return copy;
}
    let numbers = [];
    for (let i = 1; i <= 10; i++) {
        numbers.push(i);
    }

console.log(shuffleArray(numbers));

    </script>
