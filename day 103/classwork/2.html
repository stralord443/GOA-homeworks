<body>
    <script>
        function warnTheSheep(queue) {
  let wolfPosition = -1

  for (let i = 0; i < queue.length; i++) {
    if (queue[i] === "wolf") {
      wolfPosition = i
      break;
    }
  }

  if (wolfPosition === queue.length - 1) {
    return "Pls go away and stop eating my sheep"
  }

  const sheepNumber = queue.length - wolfPosition - 1

  return `Oi! Sheep number ${sheepNumber}! You are about to be eaten by a wolf!`;
}


const sheep = [ "sheep", "sheep", "sheep", "sheep", "sheep","wolf", "sheep",]

console.log(warnTheSheep(sheep))
    </script>
</body>
