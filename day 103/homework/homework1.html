<!-- 2) შექმენი კლასი Product, რომელსაც ექნება name და price. შექმენი კლასი DiscountedProduct, 
რომელიც extends Product-ს. გამოიყენე super და დაამატე discount. შექმენი მეთოდი getFinalPrice(). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Product {
            constructor(name, price) {
            this.name = name
            this.price = price
        }
    }

    class DiscountedProduct extends Product {
        constructor(name, price, discount) {
        super(name, price)
        this.discount = discount
     }

    getFinalPrice() {
        return this.price - (this.price * this.discount / 100)
    }
}

    const product1 = new DiscountedProduct("Laptop", 2000, 15)

    console.log(product1)
    console.log(product1.getFinalPrice())
    </script>
</body>
</html>
