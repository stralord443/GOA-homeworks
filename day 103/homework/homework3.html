<!-- 4) შექმენი კლასი User, რომელსაც ექნება name და email. შექმენი კლასი Admin, რომელიც extends User-ს.
გამოიყენე super და დაამატე role. შექმენი მეთოდი getRoleInfo(). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class User {
            constructor(name, email) {
            this.name = name
            this.email = email
        }
    }

    class Admin extends User {
        constructor(name, email, role) {
        super(name, email)
        this.role = role
    }

    getRoleInfo() {
        return `${this.name} is an ${this.role}`
    }
}

const admin1 = new Admin(
    "Givi",
    "givi@gmail.com",
    "Administrator"
)
    console.log(admin1)

    console.log(admin1.getRoleInfo())
    </script>
</body>
</html>
