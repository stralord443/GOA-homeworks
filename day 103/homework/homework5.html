<!-- 6) შექმენი კლასი User, რომელსაც ექნება name. დაამატე static property count. კონსტრუქტორში გაზარდე count. 
შექმენი კლასი Admin, რომელიც extends User-ს და გამოიყენე super. შეამოწმე რამდენი ობიექტი შეიქმნა. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class User {
            static count = 0

    constructor(name) {
        this.name = name

        User.count++
    }
}

    class Admin extends User {
        constructor(name) {
        super(name)
    }
}

    const user1 = new User("Givi")
    const user2 = new User("Nika")
    const admin1 = new Admin("Luka")

    console.log(User.count)
    </script>
</body>
</html>
