<!-- 3)შექმენი ღილაკი (button) და ::before-ით დაამატე მარცხენა მხარეს პატარა ხაზი, რომელიც ღილაკის სიმაღლეს ერგება. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    button {
        position: relative;
        padding: 12px 20px 12px 30px;
        font-size: 16px;
        background-color: #4a90e2;
        color: white;
        border: none;
        cursor: pointer;
    }

    button::before {
        content: "";
        position: absolute;
        left: 10px;
        top: 0;
        width: 3px;
        height: 100%;
        background-color: #ffcc00;
    }
    </style>
</head>
<body>
    <button>click</button>
</body>
</html>
