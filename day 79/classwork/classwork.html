<!-- 1) შექმენი div ელემენტი ტექსტით და ::before-ის გამოყენებით ტექსტის წინ დაამატე პატარა წრე (●) სხვა ფერით. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .div1 {
        font-size: 20px;
    }

    .div1::before {
        content: "●";
        color: red;
        margin-right: 8px;
    }
  </style>
    </style>
</head>
<body>
    <div class="div1">hello</div>
</body>
</html>
