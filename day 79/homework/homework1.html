<!-- 2) შექმენი სათაური (h1) და ::after-ით დაუმატე ქვედა ხაზი, რომლის სიგანე გამოითვლება calc(100% / 2). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            position: relative;
            background-color: blue;
            height: 70px;
            width: 100%;
        }
        h1::after{
            content: "";
            position:absolute;
            bottom: 0px;
            left: 0px;
            height: 6px;
            width: calc(100% / 2);
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h1>here is some text</h1>
</body>
</html>
