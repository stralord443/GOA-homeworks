<!-- 4) შექმენი <div> და CSS კლასი .red (წითელი ფონი). ღილაკზე დაჭერისას classList.add()-ით დაამატე ეს კლასი. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red{
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <div id="box">hi there</div>
    <br>
    <button onclick="change()">click to change</button>

    <script>
        function change(){
            document.getElementById("box").classList.add("red")
        }
    </script>
</body>
</html>
