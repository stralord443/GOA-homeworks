<!-- 1) შექმენი ღილაკი. დაჭერისას <div>-ში innerHTML-ის დახმარებით გამოჩნდეს ტექსტი: "Hello JavaScript". -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box1"></div>
    <script>
        let box = document.getElementById("box1")

        box.innerHTML = "Hello JavaScript"
    </script>
</body>
</html>
