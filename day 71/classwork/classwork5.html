<!-- 6) ერთი ღილაკით გააკეთე კლასის ჩართვა/გამორთვა classList.toggle()-ის გამოყენებით. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <style>
    .red {
      background-color: red;
    }
  </style>
</head>
<body>
    <div id="box">hello</div>
    <br>
    <button onclick="toggleRed()">on/off</button>

    <script>
        function toggleRed() {
        document.getElementById("box").classList.toggle("red")
    }
  </script>
</body>
</html>
