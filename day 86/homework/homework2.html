<!-- 3) შექმენი 3 ბარათის grid განლაგება, სადაც შუა ბარათს ექნება უფრო დიდი shadow ვიდრე დანარჩენებს. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full ">
    <!-- Card 1 -->
    <div class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition duration-300">
        <h3 class="text-lg font-semibold mb-2">Card One</h3>
        <p class="text-gray-600 text-sm">This is the first card with a normal shadow.</p>
    </div>
    <!-- Card 2 (Middle - Bigger Shadow) -->
    <div class="bg-white p-6 rounded-2xl shadow-2xl hover:shadow-3xl transition duration-300 scale-105">
        <h3 class="text-lg font-semibold mb-2">Card Two</h3>
        <p class="text-gray-600 text-sm">This middle card has a stronger shadow to stand out.</p>
    </div>
    <!-- Card 3 -->
    <div class="bg-white p-6 rounded-2xl shadow-md hover:shadow-lg transition duration-300">
        <h3 class="text-lg font-semibold mb-2">Card Three</h3>
        <p class="text-gray-600 text-sm">This is the third card with a normal shadow.</p>
    </div>
  </div>
</body>
</html>
