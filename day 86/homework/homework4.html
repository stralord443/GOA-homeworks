<!-- 5) შექმენი ბლოკი rounded კუთხეებით და ძლიერი shadow-ით, რომელიც hover-ზე ოდნავ 
“იწევს ზემოთ” (translate ეფექტის გამოყენებით). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="bg-gray-100 h-100 flex items-center justify-center p-6">
  <div class="bg-white p-8 rounded-3xl shadow-2xl transform transition-all duration-300 
            ease-out hover:-translate-y-3 hover:shadow-3xl max-w-md w-full">
    <h2 class="text-2xl font-bold text-gray-800 mb-3">Elevated Block</h2>
    <p class="text-gray-600">
      This block has rounded corners and a strong shadow.
      On hover, it slightly lifts upward using a translate effect.
    </p>
  </div>

</body>
</html>
