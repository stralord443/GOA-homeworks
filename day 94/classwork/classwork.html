<!-- 1) შექმენი მარტივი ფორმა 3 სექციით:
ინფორმაცია (სახელი, გვარი)
კონტაქტი (email, ტელეფონი)
დამატებითი ინფორმაცია (textarea)
ფორმას გაუკეთე ლამაზი დიზაინი Tailwind-ით (spacing, border, focus effects). -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <form class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md space-y-6">
    
        <div>
            <h2 class="text-lg font-semibold mb-3 text-gray-700">ინფორმაცია</h2>
            <div class="space-y-3">
                <input type="text" placeholder="სახელი" class="w-full px-4 py-2 border rounded-lg focus:outline-none
            focus:ring-2 focus:ring-blue-400 focus:border-transparent transition">
                <input type="text" placeholder="გვარი" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2
            focus:ring-blue-400 focus:border-transparent transition">
            </div>
        </div>
        <div>
            <h2 class="text-lg font-semibold mb-3 text-gray-700">კონტაქტი</h2>
                <div class="space-y-3">
                    <input type="email" placeholder="Email" class="w-full px-4 py-2 border rounded-lg focus:outline-none
                    focus:ring-2 focus:ring-green-400 focus:border-transparent transition">
                    <input type="tel" placeholder="ტელეფონი" 
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400
                    focus:border-transparent transition">
                </div>
        </div>
        <div>
            <h2 class="text-lg font-semibold mb-3 text-gray-700">დამატებითი ინფორმაცია</h2>
                <textarea rows="4" placeholder="დაწერე დამატებითი ინფორმაცია..."class="w-full px-4 py-2 border
                 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition resize-none">
                </textarea>
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg
         hover:bg-blue-600 transition duration-300">გაგზავნა</button>
  </form>
</body>
</html>
