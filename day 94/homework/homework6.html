<!-- 7) შექმენი input ველები, სადაც შეცდომის შემთხვევაში (error state) border გახდება წითელი (error color დაამატე config-ში).
 დაამატე პატარა error ტექსტიც input-ის ქვემოთ. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: '#6366f1',
                    error: '#ef4444'
                },
                    borderRadius: {
                xl2: '20px'
                }
            }
        }
    }
</script>
</head>
<body>
    <div class="max-w-md mx-auto mt-10 space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Email</label>
            <input type="email" placeholder="you@example.com" class="w-full px-4 py-2 border border-error rounded-xl2
                focus:outline-none focus:ring-2 focus:ring-error focus:border-error transition"/>
            <p class="text-error text-sm mt-1">Please enter a valid email address.</p>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Password</label>
            <input type="password" placeholder="........" class="w-full px-4 py-2 border border-error rounded-xl2
                focus:outline-none focus:ring-2 focus:ring-error focus:border-error transition"/>
            <p class="text-error text-sm mt-1">Password must be at least 8 characters.</p>
        </div>
    </div>
</body>
</html>
