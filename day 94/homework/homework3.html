<!-- 4) დაამატე Tailwind config-ში custom spacing (მაგ. "128": "32rem") და გამოიყენე ეს მნიშვნელობა section-ის height ან padding-ში. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
        extend: {
            spacing: {
                128: '32rem' // custom spacing (512px)
            },
            colors: {
                primary: '#6366f1'
            },
            borderRadius: {
                xl2: '20px'
            }
        } 
    }
  }
</script>
</head>
<body class="bg-gray-100">
    <section class="h-128 bg-primary text-white flex items-center justify-center">
        <h1 class="text-3xl font-bold">დიდი სექცია (Custom Height)</h1>
    </section>
    <section class="p-128 bg-white text-center">
        <h2 class="text-2xl font-semibold mb-4">დიდი Padding Section</h2>
        <p class="text-gray-600 max-w-xl mx-auto">ეს სექცია იყენებს custom spacing მნიშვნელობას Tailwind config-იდან.</p>
    </section>
</body>
</html>
