<!-- 2) დაამატე Tailwind config-ში custom borderRadius (მაგ. "xl2": "20px") და გამოიყენე ეს მნიშვნელობა card-ზე
 და button-ზე, რომ დიზაინი გახდეს უფრო რბილი. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                primary: '#6366f1',
                primaryDark: '#4f46e5'
            },
                borderRadius: {
            xl2: '20px'
                }
            }
        }
    }
</script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl2 shadow-xl w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Login</h2>
            <form class="space-y-5">
            <input type="email" placeholder="Email" class="w-full px-4 py-2 border border-gray-300 rounded-lg
                focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"/>
            <input type="password" placeholder="Password" class="w-full px-4 py-2 border border-gray-300 rounded-lg
                focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"/>
            <button class="w-full bg-primary text-white py-2 rounded-xl2 hover:bg-primaryDark transition shadow-md">Sign In</button>
        </form>
  </div>
</body>
</html>
